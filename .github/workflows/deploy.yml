script: |
        # 1. 直接切換到絕對路徑 (請確認 serena95428 是你的帳號)
        cd /home/serena95428/IntroduceWeb/IntroduceWeb
        
        # 2. 檢查檔案列表 (這會印在 Log 裡方便除錯)
        ls -la
        
        # 3. 強制同步程式碼 (避免再次出現 HEAD 衝突)
        git fetch --all
        git reset --hard origin/main
        
        # 4. 執行更新
        chmod +x update.sh
        ./update.sh